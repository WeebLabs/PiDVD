# Boot partition: explicitly FAT32, 128M, 4M-aligned, and CRITICALLY:
# hidden-sectors (-h) must equal the partition's LBA offset (4M = sector
# 8192). genimage builds the FAT image in isolation (hidden=0), and
# bootcode.bin's FAT parser mis-addresses on that — "start.elf not
# found" blink loop with byte-perfect files. Keep -h in sync with the
# boot partition offset below.
image boot.vfat {
	vfat {
		label = "PIDVD"
		extraargs = "-F 32 -h 16384"
		files = {
			"rpi-firmware/bootcode.bin",
			"rpi-firmware/cmdline.txt",
			"rpi-firmware/config.txt",
			"rpi-firmware/fixup.dat",
			"rpi-firmware/start.elf",
			"rpi-firmware/overlays",
			"zImage",
			"bcm2710-rpi-3-b.dtb",
			"bcm2710-rpi-3-b-plus.dtb"
		}
	}
	size = 512M
}

image sdcard.img {
	hdimage {
	}

	partition boot {
		partition-type = 0xC
		bootable = "true"
		offset = 8M
		image = "boot.vfat"
	}

	partition rootfs {
		partition-type = 0x83
		image = "rootfs.ext4"
	}
}
